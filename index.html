<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Christmas Crane</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #root { width: 100%; height: 100%; position: relative; }
        canvas { display: block; width: 100%; height: 100%; outline: none; }
        /* Disable text selection */
        * { user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
        
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .interactive {
            pointer-events: auto;
        }

        .joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 150px;
            height: 150px;
            pointer-events: auto;
            z-index: 20;
        }

        .action-btn {
            background: linear-gradient(to bottom, #ff4444, #cc0000);
            border: 4px solid #fff;
            color: white;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.1s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .action-btn:active { transform: scale(0.95); }
        .action-btn:disabled { filter: grayscale(1); cursor: not-allowed; }

        .panel {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #daa520;
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            gap: 5px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .inventory-item {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            .joystick-zone { bottom: 20px; left: 20px; }
            .action-btn { padding: 15px 30px; font-size: 20px; }
        }
    </style>

            }
        }
    </script>
</head>
